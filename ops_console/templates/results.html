{% extends "base.html" %}

{% block content %}
<section class="panel">
    <div class="panel-header">
        <div>
            <div class="eyebrow">Data</div>
            <h2>analysis_results</h2>
        </div>
        <a
            class="ghost-button"
            href="/export/results?search={{ search | urlencode }}&quick_filter={{ quick_filter }}&sort_by={{ sort_by }}&sort_dir={{ sort_dir }}"
        >
            Экспорт CSV
        </a>
    </div>

    <form method="get" action="/results" class="toolbar">
        <input type="text" name="search" placeholder="Поиск по username, reason, offer_type, icp, domain, youtube, twitter, error" value="{{ search }}">
        <select name="quick_filter">
            <option value="all" {% if quick_filter == "all" %}selected{% endif %}>All</option>
            <option value="passed" {% if quick_filter == "passed" %}selected{% endif %}>Passed C1-C3</option>
            <option value="monetization" {% if quick_filter == "monetization" %}selected{% endif %}>Monetization</option>
            <option value="has_error" {% if quick_filter == "has_error" %}selected{% endif %}>Has error</option>
            <option value="has_youtube" {% if quick_filter == "has_youtube" %}selected{% endif %}>Has youtube</option>
            <option value="has_twitter" {% if quick_filter == "has_twitter" %}selected{% endif %}>Has twitter</option>
            <option value="offer_course" {% if quick_filter == "offer_course" %}selected{% endif %}>Offer: course</option>
            <option value="offer_coaching" {% if quick_filter == "offer_coaching" %}selected{% endif %}>Offer: coaching</option>
            <option value="offer_consulting" {% if quick_filter == "offer_consulting" %}selected{% endif %}>Offer: consulting</option>
            <option value="offer_agency_service" {% if quick_filter == "offer_agency_service" %}selected{% endif %}>Offer: agency_service</option>
            <option value="offer_community_membership" {% if quick_filter == "offer_community_membership" %}selected{% endif %}>Offer: community_membership</option>
            <option value="strength_strong" {% if quick_filter == "strength_strong" %}selected{% endif %}>Strength: strong</option>
            <option value="strength_moderate" {% if quick_filter == "strength_moderate" %}selected{% endif %}>Strength: moderate</option>
            <option value="platform_multi_channel" {% if quick_filter == "platform_multi_channel" %}selected{% endif %}>Platform: multi_channel</option>
            <option value="platform_instagram_youtube" {% if quick_filter == "platform_instagram_youtube" %}selected{% endif %}>Platform: instagram_youtube</option>
            <option value="icp_icp1" {% if quick_filter == "icp_icp1" %}selected{% endif %}>ICP1</option>
            <option value="icp_icp2" {% if quick_filter == "icp_icp2" %}selected{% endif %}>ICP2</option>
            <option value="icp_icp3" {% if quick_filter == "icp_icp3" %}selected{% endif %}>ICP3</option>
            <option value="icp_icp4" {% if quick_filter == "icp_icp4" %}selected{% endif %}>ICP4</option>
            <option value="icp_icp5" {% if quick_filter == "icp_icp5" %}selected{% endif %}>ICP5</option>
        </select>
        <select name="sort_by">
            <option value="id" {% if sort_by == "id" %}selected{% endif %}>Sort: id</option>
            <option value="analyzed_at" {% if sort_by == "analyzed_at" %}selected{% endif %}>Sort: analyzed_at</option>
            <option value="username" {% if sort_by == "username" %}selected{% endif %}>Sort: username</option>
            <option value="follower_count" {% if sort_by == "follower_count" %}selected{% endif %}>Sort: follower_count</option>
            <option value="engagement_rate_pct" {% if sort_by == "engagement_rate_pct" %}selected{% endif %}>Sort: engagement_rate_pct</option>
            <option value="offer_type" {% if sort_by == "offer_type" %}selected{% endif %}>Sort: offer_type</option>
            <option value="monetization_strength" {% if sort_by == "monetization_strength" %}selected{% endif %}>Sort: monetization_strength</option>
            <option value="icp" {% if sort_by == "icp" %}selected{% endif %}>Sort: icp</option>
        </select>
        <select name="sort_dir">
            <option value="desc" {% if sort_dir == "desc" %}selected{% endif %}>DESC</option>
            <option value="asc" {% if sort_dir == "asc" %}selected{% endif %}>ASC</option>
        </select>
        <button type="submit">Применить</button>
    </form>

    <div class="column-filter-panel" id="column-filter-panel">
        <div class="column-filter-toolbar">
            <button type="button" class="column-filter-toggle-btn" id="cols-panel-toggle" aria-expanded="true" aria-controls="cols-panel-body">
                <span class="column-filter-toggle-icon" aria-hidden="true">▾</span>
                <div>
                    <div class="column-filter-title">Доп. фильтр: колонки таблицы</div>
                    <div class="muted column-filter-hint" id="cols-panel-hint">Галочка = показывать столбец. Сохраняется только в этом браузере.</div>
                </div>
            </button>
            <button type="button" class="ghost-button tiny-btn" id="cols-reset-default">По умолчанию (все)</button>
        </div>
        <div id="cols-panel-body">
            <ul class="column-filter-list" aria-label="Видимость колонок">
                {% for col in results_table_columns %}
                <li class="column-filter-row">
                    <input
                        type="checkbox"
                        class="column-toggle"
                        id="result-col-{{ loop.index0 }}"
                        data-column="{{ col }}"
                        checked
                    >
                    <label class="column-filter-name" for="result-col-{{ loop.index0 }}">{{ col }}</label>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>

    <div id="results-table-panel">
        {% include "partials/results_table.html" %}
    </div>
</section>
<script>
(function () {
    var LS_KEY = 'xpoz_results_column_visibility';
    var LS_LEGACY_HIDDEN = 'xpoz_results_hidden_cols';
    var root = document.querySelector('.result-full-table');
    var toggles = document.querySelectorAll('input.column-toggle');
    if (!root || !toggles.length) return;

    function allColumns() {
        return Array.prototype.map.call(toggles, function (input) {
            return input.getAttribute('data-column') || '';
        }).filter(Boolean);
    }

    /** @returns {Record<string, boolean>|null} */
    function loadMap() {
        try {
            var legacy = localStorage.getItem(LS_LEGACY_HIDDEN);
            if (legacy) {
                var hiddenArr = JSON.parse(legacy);
                var hidden = new Set(Array.isArray(hiddenArr) ? hiddenArr : []);
                var m = {};
                allColumns().forEach(function (col) {
                    m[col] = !hidden.has(col);
                });
                localStorage.removeItem(LS_LEGACY_HIDDEN);
                localStorage.setItem(LS_KEY, JSON.stringify(m));
                return m;
            }
        } catch (e) { /* ignore */ }

        try {
            var raw = localStorage.getItem(LS_KEY);
            if (!raw) return null;
            var parsed = JSON.parse(raw);
            return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : null;
        } catch (e) {
            return null;
        }
    }

    function isVisible(map, col) {
        if (!map) return true;
        if (!Object.prototype.hasOwnProperty.call(map, col)) return true;
        return map[col] !== false;
    }

    function persistFromUi() {
        var m = {};
        Array.prototype.forEach.call(toggles, function (input) {
            var col = input.getAttribute('data-column');
            if (col) m[col] = input.checked;
        });
        localStorage.setItem(LS_KEY, JSON.stringify(m));
    }

    function applyTableVisibility() {
        var onByCol = {};
        Array.prototype.forEach.call(toggles, function (input) {
            var col = input.getAttribute('data-column');
            if (col) onByCol[col] = input.checked;
        });
        root.querySelectorAll('[data-col]').forEach(function (el) {
            var col = el.getAttribute('data-col');
            if (!col) return;
            var on = onByCol[col] !== false;
            el.classList.toggle('col-hidden', !on);
        });
    }

    var map = loadMap();
    Array.prototype.forEach.call(toggles, function (input) {
        var col = input.getAttribute('data-column');
        if (!col) return;
        input.checked = isVisible(map, col);
    });
    applyTableVisibility();

    Array.prototype.forEach.call(toggles, function (input) {
        input.addEventListener('change', function () {
            persistFromUi();
            applyTableVisibility();
        });
    });

    var btnReset = document.getElementById('cols-reset-default');
    if (btnReset) {
        btnReset.addEventListener('click', function () {
            localStorage.removeItem(LS_KEY);
            Array.prototype.forEach.call(toggles, function (input) {
                input.checked = true;
            });
            applyTableVisibility();
        });
    }

    // Collapse / expand panel
    var LS_COLLAPSED = 'xpoz_cols_panel_collapsed';
    var panelToggleBtn = document.getElementById('cols-panel-toggle');
    var panelBody = document.getElementById('cols-panel-body');
    var panelHint = document.getElementById('cols-panel-hint');
    var toggleIcon = panelToggleBtn ? panelToggleBtn.querySelector('.column-filter-toggle-icon') : null;

    var filterPanel = document.getElementById('column-filter-panel');

    function setPanelCollapsed(collapsed) {
        if (!panelBody || !panelToggleBtn) return;
        panelBody.style.display = collapsed ? 'none' : '';
        panelToggleBtn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
        if (toggleIcon) toggleIcon.textContent = collapsed ? '▸' : '▾';
        if (panelHint) panelHint.style.display = collapsed ? 'none' : '';
        if (filterPanel) filterPanel.classList.toggle('is-collapsed', collapsed);
        try { localStorage.setItem(LS_COLLAPSED, collapsed ? '1' : '0'); } catch (e) { /* ignore */ }
    }

    var initCollapsed = false;
    try { initCollapsed = localStorage.getItem(LS_COLLAPSED) === '1'; } catch (e) { /* ignore */ }
    setPanelCollapsed(initCollapsed);

    if (panelToggleBtn) {
        panelToggleBtn.addEventListener('click', function () {
            var isCollapsed = panelBody.style.display === 'none';
            setPanelCollapsed(!isCollapsed);
        });
    }
})();
</script>
{% endblock %}
