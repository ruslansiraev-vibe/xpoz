{% extends "base.html" %}

{% block content %}
<section class="panel">
    <div class="panel-header">
        <div>
            <div class="eyebrow">Data</div>
            <h2>analysis_results</h2>
        </div>
        <a
            class="ghost-button"
            href="/export/results?search={{ search | urlencode }}&quick_filter={{ quick_filter }}&sort_by={{ sort_by }}&sort_dir={{ sort_dir }}"
        >
            Экспорт CSV
        </a>
    </div>

    <form method="get" action="/results" class="toolbar">
        <input type="text" name="search" placeholder="Поиск по username, reason, offer_type, icp, domain, youtube, twitter, error" value="{{ search }}">
        <select name="quick_filter">
            <option value="all" {% if quick_filter == "all" %}selected{% endif %}>All</option>
            <option value="passed" {% if quick_filter == "passed" %}selected{% endif %}>Passed C1-C3</option>
            <option value="monetization" {% if quick_filter == "monetization" %}selected{% endif %}>Monetization</option>
            <option value="has_error" {% if quick_filter == "has_error" %}selected{% endif %}>Has error</option>
            <option value="has_youtube" {% if quick_filter == "has_youtube" %}selected{% endif %}>Has youtube</option>
            <option value="has_twitter" {% if quick_filter == "has_twitter" %}selected{% endif %}>Has twitter</option>
            <option value="offer_course" {% if quick_filter == "offer_course" %}selected{% endif %}>Offer: course</option>
            <option value="offer_coaching" {% if quick_filter == "offer_coaching" %}selected{% endif %}>Offer: coaching</option>
            <option value="offer_consulting" {% if quick_filter == "offer_consulting" %}selected{% endif %}>Offer: consulting</option>
            <option value="offer_agency_service" {% if quick_filter == "offer_agency_service" %}selected{% endif %}>Offer: agency_service</option>
            <option value="offer_community_membership" {% if quick_filter == "offer_community_membership" %}selected{% endif %}>Offer: community_membership</option>
            <option value="strength_strong" {% if quick_filter == "strength_strong" %}selected{% endif %}>Strength: strong</option>
            <option value="strength_moderate" {% if quick_filter == "strength_moderate" %}selected{% endif %}>Strength: moderate</option>
            <option value="platform_multi_channel" {% if quick_filter == "platform_multi_channel" %}selected{% endif %}>Platform: multi_channel</option>
            <option value="platform_instagram_youtube" {% if quick_filter == "platform_instagram_youtube" %}selected{% endif %}>Platform: instagram_youtube</option>
            <option value="icp_icp1" {% if quick_filter == "icp_icp1" %}selected{% endif %}>ICP1</option>
            <option value="icp_icp2" {% if quick_filter == "icp_icp2" %}selected{% endif %}>ICP2</option>
            <option value="icp_icp3" {% if quick_filter == "icp_icp3" %}selected{% endif %}>ICP3</option>
            <option value="icp_icp4" {% if quick_filter == "icp_icp4" %}selected{% endif %}>ICP4</option>
            <option value="icp_icp5" {% if quick_filter == "icp_icp5" %}selected{% endif %}>ICP5</option>
        </select>
        <select name="sort_by">
            <option value="id" {% if sort_by == "id" %}selected{% endif %}>Sort: id</option>
            <option value="analyzed_at" {% if sort_by == "analyzed_at" %}selected{% endif %}>Sort: analyzed_at</option>
            <option value="username" {% if sort_by == "username" %}selected{% endif %}>Sort: username</option>
            <option value="follower_count" {% if sort_by == "follower_count" %}selected{% endif %}>Sort: follower_count</option>
            <option value="engagement_rate_pct" {% if sort_by == "engagement_rate_pct" %}selected{% endif %}>Sort: engagement_rate_pct</option>
            <option value="offer_type" {% if sort_by == "offer_type" %}selected{% endif %}>Sort: offer_type</option>
            <option value="monetization_strength" {% if sort_by == "monetization_strength" %}selected{% endif %}>Sort: monetization_strength</option>
            <option value="icp" {% if sort_by == "icp" %}selected{% endif %}>Sort: icp</option>
        </select>
        <select name="sort_dir">
            <option value="desc" {% if sort_dir == "desc" %}selected{% endif %}>DESC</option>
            <option value="asc" {% if sort_dir == "asc" %}selected{% endif %}>ASC</option>
        </select>
        <button type="submit">Применить</button>
    </form>

    <details class="column-picker">
        <summary>Видимые колонки <span class="muted">(сохраняется в браузере)</span></summary>
        <div class="column-picker-inner">
            <div class="column-picker-actions">
                <button type="button" class="ghost-button tiny-btn" id="cols-show-all">Все</button>
                <button type="button" class="ghost-button tiny-btn" id="cols-hide-all">Скрыть все</button>
            </div>
            <div class="column-picker-grid">
                {% for col in results_table_columns %}
                <label class="column-picker-item">
                    <input type="checkbox" class="column-toggle" value="{{ col }}" checked>
                    <span title="{{ col }}">{{ col }}</span>
                </label>
                {% endfor %}
            </div>
        </div>
    </details>

    <div id="results-table-panel">
        {% include "partials/results_table.html" %}
    </div>
</section>
<script>
(function () {
    var LS_KEY = 'xpoz_results_hidden_cols';
    var root = document.querySelector('.result-full-table');
    if (!root) return;

    function loadHidden() {
        try {
            var raw = localStorage.getItem(LS_KEY);
            if (!raw) return new Set();
            var arr = JSON.parse(raw);
            return new Set(Array.isArray(arr) ? arr : []);
        } catch (e) {
            return new Set();
        }
    }

    function saveHidden(hidden) {
        localStorage.setItem(LS_KEY, JSON.stringify(Array.from(hidden)));
    }

    function applyVisibility(hidden) {
        root.querySelectorAll('[data-col]').forEach(function (el) {
            var col = el.getAttribute('data-col');
            if (!col) return;
            el.classList.toggle('col-hidden', hidden.has(col));
        });
    }

    function syncCheckboxes(hidden) {
        document.querySelectorAll('input.column-toggle').forEach(function (input) {
            input.checked = !hidden.has(input.value);
        });
    }

    var hidden = loadHidden();
    applyVisibility(hidden);
    syncCheckboxes(hidden);

    document.querySelectorAll('input.column-toggle').forEach(function (input) {
        input.addEventListener('change', function () {
            if (input.checked) {
                hidden.delete(input.value);
            } else {
                hidden.add(input.value);
            }
            saveHidden(hidden);
            applyVisibility(hidden);
        });
    });

    var btnAll = document.getElementById('cols-show-all');
    var btnNone = document.getElementById('cols-hide-all');
    if (btnAll) {
        btnAll.addEventListener('click', function () {
            hidden.clear();
            saveHidden(hidden);
            syncCheckboxes(hidden);
            applyVisibility(hidden);
        });
    }
    if (btnNone) {
        btnNone.addEventListener('click', function () {
            document.querySelectorAll('input.column-toggle').forEach(function (input) {
                hidden.add(input.value);
            });
            saveHidden(hidden);
            syncCheckboxes(hidden);
            applyVisibility(hidden);
        });
    }
})();
</script>
{% endblock %}
